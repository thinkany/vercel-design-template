<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .ring { fill: none; stroke: #000; stroke-width: 1.5 }
    .dot { fill: #000 }
    @media (prefers-color-scheme: dark) {
      .ring { stroke: #fff }
      .dot { fill: #fff }
    }
  </style>
  <circle class="ring" cx="16" cy="16" r="13" />
  <circle class="dot" cx="16" cy="16" r="2.25" />
</svg>
